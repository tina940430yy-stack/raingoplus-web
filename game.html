<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接雨滴遊戲 - 雨中公園版</title>
    <style>
        /* --- 基礎設定 --- */
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #333; font-family: "Microsoft JhengHei", sans-serif; touch-action: none; }
        
        #game-container { 
            width: 375px; height: 812px; position: relative; margin: 0 auto; 
            background: #c8ded6; /* 預設底色 */
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); 
        }

        /* --- 雨中公園背景 (純 CSS 繪製) --- */
        .bg-element { position: absolute; pointer-events: none; }
        
        /* 天空與雲朵 */
        .sky { top: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to bottom, #8ca8a0 0%, #c8ded6 100%); z-index: 0; }
        .cloud { background: rgba(255, 255, 255, 0.4); border-radius: 50px; z-index: 1; }
        .cloud-1 { top: 12%; left: 10%; width: 120px; height: 35px; }
        .cloud-1::after { content: ''; position: absolute; top: -15px; left: 20px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; }
        .cloud-2 { top: 22%; right: -20px; width: 150px; height: 40px; }
        .cloud-2::after { content: ''; position: absolute; top: -20px; right: 30px; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; }

        /* 遠景灌木叢 */
        .bush { background: #5a8a72; border-radius: 50%; z-index: 2; }
        .bush-1 { bottom: 350px; left: -20px; width: 150px; height: 100px; }
        .bush-2 { bottom: 380px; left: 80px; width: 120px; height: 80px; background: #6b9c84; }
        .bush-3 { bottom: 360px; right: -30px; width: 200px; height: 120px; }

        /* 草地與小徑 */
        .grass { bottom: 0; left: 0; width: 100%; height: 400px; background: #a6c9b6; z-index: 3; border-top-left-radius: 50% 30px; border-top-right-radius: 50% 40px; }
        .path { bottom: 0; left: 100px; width: 120px; height: 400px; background: #c2cdbd; z-index: 4; border-top-left-radius: 60px; transform: skewX(-15deg); }
        
        /* 公園設施 (樹、路燈、長椅) */
        .tree-trunk { bottom: 180px; left: 40px; width: 15px; height: 80px; background: #7c6a58; z-index: 5; }
        .tree-leaves { bottom: 230px; left: -15px; width: 120px; height: 140px; background: #4a755d; border-radius: 60px 60px 20px 20px; z-index: 6; }
        
        .lamp-post { bottom: 200px; right: 70px; width: 6px; height: 150px; background: #1f5043; z-index: 5; }
        .lamp-head { bottom: 345px; right: 58px; width: 30px; height: 15px; background: #1f5043; border-radius: 10px 10px 0 0; z-index: 5; }
        .lamp-light { bottom: 340px; right: 65px; width: 16px; height: 10px; background: rgba(255, 255, 150, 0.8); border-radius: 5px; z-index: 5; box-shadow: 0 0 15px rgba(255,255,150,0.5); }

        .park-bench { bottom: 200px; right: 120px; width: 90px; height: 35px; border: 5px solid #6b9c84; border-radius: 5px; z-index: 5; border-bottom: none; }
        .park-bench::after { content: ''; position: absolute; bottom: 0; left: 10px; right: 10px; height: 5px; background: #6b9c84; }

        /* 地面積水 */
        .puddle { background: rgba(255,255,255,0.3); border-radius: 50%; height: 12px; z-index: 5; }
        .puddle-1 { bottom: 80px; left: 130px; width: 70px; }
        .puddle-2 { bottom: 140px; right: 80px; width: 45px; }

        /* --- UI 資訊列 --- */
        #ui-layer { position: absolute; top: 30px; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; color: #1f5043; font-size: 18px; pointer-events: none; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }

        /* --- 畫布 --- */
        canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 8; }

        /* --- 彈跳視窗 (Modals) --- */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        
        /* 打卡卡片設計 */
        .checkin-card { background: #3d6051; border-radius: 20px; width: 300px; padding: 25px; color: white; position: relative; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .checkin-card h2 { font-size: 18px; margin: 0 0 20px 0; line-height: 1.4; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .grid-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 5px; font-size: 12px; }
        .grid-item .drop-icon { width: 20px; height: 25px; background: #76c3d0; border-radius: 50% 50% 50% 50% / 10% 10% 80% 80%; margin: 5px auto; transform: rotate(180deg); }
        .footer-text { font-size: 12px; opacity: 0.7; }
        
        /* 關閉按鈕 (X) */
        .close-x { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; background: #76c3d0; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; cursor: pointer; border: 3px solid #fff; }

        /* 中間開始按鈕 */
        #ready-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none; justify-content: center; align-items: center; }
        #play-btn { width: 80px; height: 80px; background: #76c3d0; border-radius: 50%; border: 4px solid #fff; position: relative; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #play-btn::after { content: ''; position: absolute; left: 32px; top: 22px; border-style: solid; border-width: 18px 0 18px 25px; border-color: transparent transparent transparent white; }

        /* 結算按鈕 */
        .modal button { padding: 12px 30px; font-size: 18px; cursor: pointer; border-radius: 25px; border: none; background: #fff; color: #1f5043; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="bg-element sky"></div>
    <div class="bg-element cloud cloud-1"></div>
    <div class="bg-element cloud cloud-2"></div>
    
    <div class="bg-element bush bush-1"></div>
    <div class="bg-element bush bush-2"></div>
    <div class="bg-element bush bush-3"></div>
    
    <div class="bg-element grass"></div>
    <div class="bg-element path"></div>
    
    <div class="bg-element tree-trunk"></div>
    <div class="bg-element tree-leaves"></div>
    
    <div class="bg-element lamp-post"></div>
    <div class="bg-element lamp-head"></div>
    <div class="bg-element lamp-light"></div>
    
    <div class="bg-element park-bench"></div>
    
    <div class="bg-element puddle puddle-1"></div>
    <div class="bg-element puddle puddle-2"></div>

    <div id="ui-layer">
        <span id="timeDisplay">TIME : 15</span>
        <span id="scoreDisplay">SCORE : 0</span>
        <span id="livesDisplay">LIVES : 3</span>
    </div>
    
    <canvas id="gameCanvas" width="375" height="812"></canvas>

    <div id="checkin-modal" class="modal active">
        <div class="checkin-card">
            <div class="close-x" id="close-checkin">×</div>
            <h2>每日雨滴請收下<br>每天蒐集幸福滿滿</h2>
            <div class="grid-container">
                <div class="grid-item">D1<div class="drop-icon"></div></div>
                <div class="grid-item">D2<div class="drop-icon"></div></div>
                <div class="grid-item">D3<div class="drop-icon"></div></div>
                <div class="grid-item">D4<div class="drop-icon"></div></div>
                <div class="grid-item">D5<div class="drop-icon"></div></div>
                <div class="grid-item">D6<div class="drop-icon"></div></div>
                <div class="grid-item">D7<div class="drop-icon"></div></div>
            </div>
            <div class="footer-text">每週一 UTC00 重置</div>
        </div>
    </div>

    <div id="ready-overlay">
        <div id="play-btn"></div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="checkin-card">
            <h2 id="end-message">沒接到QQ<br>下次再努力！</h2>
            <button id="restart-btn">再玩一次</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timeDisplay = document.getElementById('timeDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    
    const checkinModal = document.getElementById('checkin-modal');
    const readyOverlay = document.getElementById('ready-overlay');
    const gameOverModal = document.getElementById('game-over-modal');
    
    const closeCheckin = document.getElementById('close-checkin');
    const playBtn = document.getElementById('play-btn');
    const restartBtn = document.getElementById('restart-btn');

    let score = 0;
    let timeLeft = 15; // 遊戲時間改為 15 秒
    let lives = 3;
    let isPlaying = false;
    let raindrops = [];
    let animationId, dropIntervalId, timerId;

    // 玩家設定 (改為雨傘)
    const player = {
        x: canvas.width / 2,
        y: canvas.height - 80, // 稍微往上移，預留傘柄空間
        radius: 40,
        color: '#1f5043'
    };

    // --- 流程控制 ---
    closeCheckin.onclick = () => {
        checkinModal.classList.remove('active');
        readyOverlay.style.display = 'flex'; 
        drawPlayerOnly(); 
    };

    playBtn.onclick = () => {
        readyOverlay.style.display = 'none';
        startGame();
    };

    restartBtn.onclick = startGame;

    // --- 操控邏輯 ---
    function moveHandler(e) {
        if (!isPlaying && readyOverlay.style.display !== 'flex') return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let x = clientX - rect.left;
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, x));
        if (!isPlaying) drawPlayerOnly(); 
    }

    canvas.addEventListener('mousemove', moveHandler);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveHandler(e); }, {passive:false});

    // --- 繪圖與遊戲核心 ---

    // 畫出小雨傘的專屬函數
    function drawUmbrella() {
        // 1. 畫傘面 (半圓)
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, Math.PI, 0);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();

        // 2. 畫傘柄 (直線)
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x, player.y + 35);
        ctx.strokeStyle = player.color;
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.closePath();

        // 3. 畫把手 (J型彎勾)
        ctx.beginPath();
        ctx.arc(player.x - 6, player.y + 35, 6, 0, Math.PI);
        ctx.strokeStyle = player.color;
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.closePath();
    }

    function drawPlayerOnly() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawUmbrella();
    }

    function spawnRaindrop() {
        if (!isPlaying) return;
        raindrops.push({
            x: Math.random() * (canvas.width - 20) + 10,
            y: -20,
            radius: 8,
            speed: 5 + Math.random() * 3 // 配合 15 秒節奏，水滴稍微快一點點
        });
    }

    function gameLoop() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫雨傘
        drawUmbrella();

        // 雨滴更新
        for (let i = raindrops.length - 1; i >= 0; i--) {
            let d = raindrops[i];
            d.y += d.speed;

            // 畫水滴
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#76c3d0';
            ctx.fill();
            ctx.closePath();

            // 碰撞檢測 (只判斷碰到傘面)
            let dx = d.x - player.x;
            let dy = d.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < d.radius + player.radius && d.y < player.y) {
                score++;
                updateUI();
                raindrops.splice(i, 1);
            } else if (d.y > canvas.height) {
                lives--;
                updateUI();
                raindrops.splice(i, 1);
                if (lives <= 0) endGame(false);
            }
        }
        animationId = requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        timeDisplay.innerText = `TIME : ${timeLeft}`;
        scoreDisplay.innerText = `SCORE : ${score}`;
        livesDisplay.innerText = `LIVES : ${lives}`;
    }

    function startGame() {
        gameOverModal.classList.remove('active');
        readyOverlay.style.display = 'none';
        score = 0; 
        timeLeft = 15; // 改回 15 秒
        lives = 3; 
        raindrops = [];
        isPlaying = true;
        updateUI();
        
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) endGame(true);
        }, 1000);

        clearInterval(dropIntervalId);
        dropIntervalId = setInterval(spawnRaindrop, 400); // 產出頻率
        
        cancelAnimationFrame(animationId);
        gameLoop();
    }

    function endGame(success) {
        isPlaying = false;
        clearInterval(timerId);
        clearInterval(dropIntervalId);
        document.getElementById('end-message').innerHTML = success ? 
            "恭喜獲得 0.2點<br><span style='font-size:14px'>每日00:00重置</span>" : 
            "沒接到QQ<br>下次再努力！";
        gameOverModal.classList.add('active');
    }
</script>
</body>
</html>
